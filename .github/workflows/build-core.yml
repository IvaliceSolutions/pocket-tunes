# Builds the Pocket Tunes openFPGA core and packages an SD-ready zip.
# Trigger manually (workflow_dispatch) or by pushing a version tag.
name: Build core
on:
  workflow_dispatch:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile with Quartus 21.1
        run: |
          docker run --rm -v ${{ github.workspace }}:/build raetro/quartus:21.1 \
            bash -c "cd /build/core/projects && quartus_sh --flow compile pocket_tunes"

      - name: Upload failure logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: quartus-output
          path: core/projects/output_files/

      - name: Reverse bitstream (.rbf → .rev)
        run: |
          python3 core/scripts/reverse_rbf.py \
            core/projects/output_files/pocket_tunes.rbf \
            core/pkg/Cores/jh.Tunes/pocket_tunes.rev

      - name: Assemble SD package
        run: |
          mkdir -p staging
          cp -r core/pkg/Cores core/pkg/Platforms staging/
          mkdir -p "staging/Assets/pockettunes/common"
          echo "Place library.json + covers/ here (generated by pocket-tunes-indexer)." \
            > "staging/Assets/pockettunes/common/README.txt"

      - name: Upload SD package
        uses: actions/upload-artifact@v4
        with:
          name: pocket-tunes-sd
          path: staging/
